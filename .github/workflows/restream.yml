name: FB-Now Restream
on:
  workflow_dispatch:
    inputs:
      source_url:
        description: Source URL (YouTube, Twitch, etc.)
        required: true
      output_url:
        description: Facebook RTMPS URL
        required: true
      overlay_text:
        description: Overlay text on stream
        required: false
        default: ''
      cookies_b64:
        description: Base64-encoded cookies.txt for YouTube sources
        required: false
        default: ''
      github_token:
        description: GitHub PAT for self-trigger
        required: false
        default: ''
      chat_enabled:
        description: Enable live chat overlay on stream
        required: false
        default: 'false'
      fb_live_video_id:
        description: Facebook live video ID for chat (from live producer page)
        required: false
        default: ''
      fb_chat_token:
        description: Facebook Page access token for reading comments
        required: false
        default: ''

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends ffmpeg fonts-dejavu-core curl unzip
          pip install -q yt-dlp curl_cffi
          curl -fsSL https://deno.land/install.sh | sh || true
          echo "$HOME/.deno/bin" >> $GITHUB_PATH
          export PATH="$HOME/.deno/bin:$PATH"
          yt-dlp --version
          deno --version || true

      - name: Setup cookies
        run: |
          RAW="${{ inputs.cookies_b64 }}"
          if [ -n "$RAW" ]; then
            echo "$RAW" | base64 -d > cookies.txt 2>/dev/null || echo "$RAW" > cookies.txt
            LINES=$(wc -l < cookies.txt)
            BYTES=$(wc -c < cookies.txt)
            echo "Cookies: $BYTES bytes, $LINES lines"
            head -3 cookies.txt
            echo "COOKIES=--cookies cookies.txt" >> $GITHUB_ENV
          else
            echo "COOKIES=" >> $GITHUB_ENV
            echo "No cookies provided"
          fi

      - name: Resolve source
        id: resolve
        run: |
          export PATH="$HOME/.deno/bin:$PATH"
          URL="${{ inputs.source_url }}"
          echo "Source: $URL"
          echo "Cookies: $COOKIES"

          urls=""
          yt_dlp_resolve() {
            for CLIENT in mediaconnect mweb android web; do
              echo "--- HLS try: player_client=$CLIENT ---"
              urls=$(yt-dlp --extractor-args "youtube:player_client=$CLIENT" $COOKIES --no-check-certificates -g --socket-timeout 30 "$URL" 2>/tmp/yt_err.txt) && [ -n "$urls" ] && echo "HLS OK with client=$CLIENT" && return 0
              cat /tmp/yt_err.txt | tail -3
            done
            return 1
          }

          yt_dlp_download() {
            for CLIENT in mediaconnect mweb android web; do
              echo "--- Download try: player_client=$CLIENT ---"
              yt-dlp --extractor-args "youtube:player_client=$CLIENT" $COOKIES --no-check-certificates \
                -f "bestvideo[height<=720]+bestaudio/best[height<=720]/best" \
                --merge-output-format mp4 -o "source_video.mp4" \
                "$URL" 2>&1 | tail -5 || true
              if [ -f "source_video.mp4" ] && [ -s "source_video.mp4" ]; then
                echo "Download OK with client=$CLIENT"
                return 0
              fi
              rm -f source_video.mp4
            done
            return 1
          }

          echo "=== Step 1: Try live HLS ==="
          if yt_dlp_resolve; then
            count=$(echo "$urls" | wc -l)
            if [ "$count" -ge 2 ]; then
              echo "video_url=$(echo "$urls" | head -1)" >> "$GITHUB_OUTPUT"
              echo "audio_url=$(echo "$urls" | sed -n '2p')" >> "$GITHUB_OUTPUT"
              echo "has_separate_audio=true" >> "$GITHUB_OUTPUT"
            else
              echo "video_url=$urls" >> "$GITHUB_OUTPUT"
              echo "audio_url=" >> "$GITHUB_OUTPUT"
              echo "has_separate_audio=false" >> "$GITHUB_OUTPUT"
            fi
            echo "mode=stream" >> "$GITHUB_OUTPUT"
            echo "=== Resolved as live HLS stream ==="
            exit 0
          fi

          echo ""
          echo "=== Step 2: Try Piped API (YouTube proxy) ==="
          echo 'import sys,json' > pick_stream.py
          echo 'd=json.load(sys.stdin)' >> pick_stream.py
          echo 'for s in d.get("videoStreams",[]):' >> pick_stream.py
          echo '    q=s.get("quality",""); mt=s.get("mimeType","")' >> pick_stream.py
          echo '    if "720" in q and "mp4" in mt: print(s.get("url","")); sys.exit(0)' >> pick_stream.py
          echo 'for s in d.get("videoStreams",[]):' >> pick_stream.py
          echo '    if "720" in s.get("quality",""): print(s.get("url","")); sys.exit(0)' >> pick_stream.py
          echo 'for s in d.get("videoStreams",[]):' >> pick_stream.py
          echo '    if not s.get("videoOnly",True) and s.get("url"): print(s.get("url","")); sys.exit(0)' >> pick_stream.py
          echo 'if d.get("videoStreams"): print(d["videoStreams"][0].get("url",""))' >> pick_stream.py
          piped_download() {
            local video_url="$1"
            local vid=$(echo "$video_url" | grep -oP '(?:v=|live/|youtu\.be/)\K[\w-]+' | head -1)
            if [ -z "$vid" ]; then echo "No video ID"; return 1; fi
            echo "Video ID: $vid"
            for INSTANCE in "pipedapi.kavin.rocks" "api.piped.yt" "pipedapi.adminforge.de" "piped-api.lunar.icu"; do
              echo "--- Piped: $INSTANCE ---"
              local resp=$(curl -s --max-time 15 "https://$INSTANCE/streams/$vid" 2>/dev/null)
              local title=$(echo "$resp" | python3 -c "import sys,json; print(json.load(sys.stdin).get('title',''))" 2>/dev/null)
              if [ -n "$title" ] && [ "$title" != "" ]; then
                echo "Title: $title"
                local stream_url=$(echo "$resp" | python3 pick_stream.py 2>/dev/null)
                if [ -n "$stream_url" ] && [ "$stream_url" != "" ]; then
                  echo "Downloading via Piped..."
                  ffmpeg -y -i "$stream_url" -c copy -t 3600 source_video.mp4 2>&1 | tail -5 || true
                  if [ -f "source_video.mp4" ] && [ -s "source_video.mp4" ]; then
                    echo "Downloaded via Piped from $INSTANCE"
                    return 0
                  fi
                  rm -f source_video.mp4
                fi
              fi
            done
            return 1
          }

          if piped_download "$URL"; then
            SIZE=$(ls -lh source_video.mp4 | awk '{print $5}')
            echo "mode=download" >> "$GITHUB_OUTPUT"
            echo "=== Downloaded via Piped: $SIZE ==="
            exit 0
          fi

          echo ""
          echo "=== Step 3: Try yt-dlp ==="
          if yt_dlp_download; then
            SIZE=$(ls -lh source_video.mp4 | awk '{print $5}')
            echo "mode=download" >> "$GITHUB_OUTPUT"
            echo "=== Downloaded video: $SIZE ==="
            exit 0
          fi

          echo "ERROR: Could not resolve or download source. Check cookies and URL."
          exit 1

      - name: Overlay text updater
        run: |
          echo "${{ inputs.overlay_text }}" > overlay.txt
          (while true; do
            curl -s "https://strwithgit.pythonanywhere.com/config" | python3 -c "import sys,json; print(json.load(sys.stdin).get('overlay_text',''))" > overlay.txt 2>/dev/null || true
            sleep 10
          done) &

      - name: Start chat renderer
        if: inputs.chat_enabled == 'true' && inputs.fb_live_video_id != '' && inputs.fb_chat_token != ''
        run: |
          echo " " > chat.txt
          pip install -q requests 2>/dev/null || true
          python3 $GITHUB_WORKSPACE/chat_renderer.py \
            --platform facebook \
            --video-id "${{ inputs.fb_live_video_id }}" \
            --access-token "${{ inputs.fb_chat_token }}" \
            --output chat.txt \
            --max-messages 10 \
            --poll-interval 3 &
          echo "Chat renderer started"

      - name: Schedule self-reboot
        if: inputs.github_token != ''
        run: |
          TRIGGER_WORKFLOW() {
            curl -s -X POST \
              -H "Authorization: Bearer ${{ inputs.github_token }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/restream.yml/dispatches" \
              -d '{"ref":"main","inputs":{
                "source_url":"${{ inputs.source_url }}",
                "output_url":"${{ inputs.output_url }}",
                "overlay_text":"${{ inputs.overlay_text }}",
                "cookies_b64":"${{ inputs.cookies_b64 }}",
                "github_token":"${{ inputs.github_token }}",
                "chat_enabled":"${{ inputs.chat_enabled }}",
                "fb_live_video_id":"${{ inputs.fb_live_video_id }}",
                "fb_chat_token":"${{ inputs.fb_chat_token }}"
              }}'
          }
          (sleep 19800 && for i in 1 2 3; do
            echo "Self-reboot attempt $i..."
            RESP=$(TRIGGER_WORKFLOW)
            echo "$RESP"
            if echo "$RESP" | grep -q '"id"'; then
              echo "Self-reboot triggered"
              break
            fi
            sleep 30
          done) &

      - name: Stream to Facebook
        run: |
          MODE="${{ steps.resolve.outputs.mode }}"
          OT="${{ inputs.overlay_text }}"
          FONT="/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"
          CHAT="${{ inputs.chat_enabled }}"
          echo "$OT" > overlay.txt

          FB_URL="${{ inputs.output_url }}"
          echo "Output: $FB_URL | Mode: $MODE"

          CHAT_FILTER=""
          if [ "$CHAT" = "true" ]; then
            echo " " > chat.txt
            CHAT_FILTER=",drawtext=textfile=chat.txt:reload=1:fontfile=$FONT:fontsize=h*0.028:fontcolor=white:x=10:y=h-th-80:shadowcolor=black@0.7:shadowx=2:shadowy=2"
            echo "Chat overlay enabled"
          fi

          if [ "$MODE" = "download" ]; then
            echo "=== Streaming downloaded file (loop) ==="
            for attempt in $(seq 1 50); do
              echo "=== Stream attempt $attempt at $(date) ==="
              ffmpeg -nostdin -re -stream_loop -1 -i source_video.mp4 \
                -filter_complex "[0:v]scale='min(1920,iw)':'min(1080,ih)':force_original_aspect_ratio=decrease,drawtext=textfile=overlay.txt:reload=1:fontfile=$FONT:fontsize=h*0.04:fontcolor=white:x=(w-text_w)/2:y=h-th-20:shadowcolor=black@0.8:shadowx=3:shadowy=3${CHAT_FILTER},format=yuv420p[out]" \
                -map "[out]" -map 0:a \
                -c:v libx264 -preset fast -r 30 -b:v 4000k -maxrate 4000k -bufsize 8000k -g 60 \
                -x264-params "keyint=60:min-keyint=60" -c:a aac -b:a 128k \
                -f flv "$FB_URL" && break
              echo "ffmpeg exited with code $?, retrying in 10s..."
              sleep 10
            done
          else
            echo "=== Streaming live HLS ==="
            PWL="file,http,https,tcp,tls,crypto,srt,rtmp,rtmps"
            VIDEO_URL="${{ steps.resolve.outputs.video_url }}"
            AUDIO_URL="${{ steps.resolve.outputs.audio_url }}"
            HAS_SEP="${{ steps.resolve.outputs.has_separate_audio }}"

            for attempt in $(seq 1 50); do
              echo "=== Stream attempt $attempt at $(date) ==="
              INPUTS=(-nostdin -re -protocol_whitelist "$PWL" -fflags +discardcorrupt -timeout 30000000 -i "$VIDEO_URL")
              if [ "$HAS_SEP" = "true" ] && [ -n "$AUDIO_URL" ]; then
                INPUTS+=(-i "$AUDIO_URL")
                AMAP="-map 1:a"
              else
                AMAP="-map 0:a"
              fi
              ffmpeg "${INPUTS[@]}" \
                -filter_complex "[0:v]scale='min(1920,iw)':'min(1080,ih)':force_original_aspect_ratio=decrease,drawtext=textfile=overlay.txt:reload=1:fontfile=$FONT:fontsize=h*0.04:fontcolor=white:x=(w-text_w)/2:y=h-th-20:shadowcolor=black@0.8:shadowx=3:shadowy=3${CHAT_FILTER},format=yuv420p[out]" \
                -map "[out]" $AMAP \
                -c:v libx264 -preset fast -r 30 -b:v 4000k -maxrate 4000k -bufsize 8000k -g 60 \
                -x264-params "keyint=60:min-keyint=60" -c:a aac -b:a 128k \
                -f flv "$FB_URL" && break
              echo "ffmpeg exited with code $?, retrying in 10s..."
              sleep 10
            done
          fi
