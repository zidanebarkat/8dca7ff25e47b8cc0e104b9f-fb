name: FB-Now Restream
on:
  workflow_dispatch:
    inputs:
      source_url:
        description: Source URL (YouTube, Twitch, etc.)
        required: true
      output_url:
        description: Facebook RTMPS URL
        required: true
      overlay_text:
        description: Overlay text on stream
        required: false
        default: ''
      cookies_b64:
        description: Base64-encoded cookies.txt for YouTube sources
        required: false
        default: ''
      github_token:
        description: GitHub PAT for self-trigger
        required: false
        default: ''
      source_list_b64:
        description: Base64-encoded list of source URLs (one per line)
        required: false
        default: ''
      source_index:
        description: Current source index in the queue
        required: false
        default: '0'
      source_duration:
        description: Max seconds per source (0=unlimited)
        required: false
        default: '1800'
      chat_enabled:
        description: Enable live chat overlay on stream
        required: false
        default: 'false'
      fb_live_video_id:
        description: Facebook live video ID for chat (from live producer page)
        required: false
        default: ''
      fb_chat_token:
        description: Facebook Page access token for reading comments
        required: false
        default: ''

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends ffmpeg fonts-dejavu-core curl unzip
          pip install -q yt-dlp curl_cffi
          curl -fsSL https://deno.land/install.sh | sh || true
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Setup cookies
        run: |
          if [ -n "${{ inputs.cookies_b64 }}" ]; then
            echo "${{ inputs.cookies_b64 }}" | base64 -d > cookies.txt
            echo "COOKIES=--cookies cookies.txt" >> $GITHUB_ENV
            echo "Cookies loaded ($(wc -c < cookies.txt) bytes)"
          else
            echo "COOKIES=" >> $GITHUB_ENV
            echo "No cookies provided, trying without"
          fi

      - name: Resolve source
        id: resolve
        run: |
          echo "=== Trying live HLS first ==="
          urls=$(yt-dlp --impersonate chrome --remote-components ejs:github --extractor-args "youtube:player_client=web" $COOKIES -g --socket-timeout 30 "${{ inputs.source_url }}" 2>/tmp/yt_err.txt) || true
          cat /tmp/yt_err.txt
          if [ -n "$urls" ]; then
            count=$(echo "$urls" | wc -l)
            if [ "$count" -ge 2 ]; then
              echo "video_url=$(echo "$urls" | head -1)" >> "$GITHUB_OUTPUT"
              echo "audio_url=$(echo "$urls" | sed -n '2p')" >> "$GITHUB_OUTPUT"
              echo "has_separate_audio=true" >> "$GITHUB_OUTPUT"
            else
              echo "video_url=$urls" >> "$GITHUB_OUTPUT"
              echo "audio_url=" >> "$GITHUB_OUTPUT"
              echo "has_separate_audio=false" >> "$GITHUB_OUTPUT"
            fi
            echo "mode=stream" >> "$GITHUB_OUTPUT"
            echo "live=true" >> "$GITHUB_OUTPUT"
            echo "Resolved as live stream"
          else
            echo "=== Not live, downloading video ==="
            yt-dlp --impersonate chrome --remote-components ejs:github --extractor-args "youtube:player_client=web" $COOKIES \
              -f "bestvideo[height<=1080]+bestaudio/best[height<=1080]/best" \
              --merge-output-format mp4 -o "source_video.mp4" \
              "${{ inputs.source_url }}" 2>&1 || true
            if [ -f "source_video.mp4" ] && [ -s "source_video.mp4" ]; then
              echo "mode=download" >> "$GITHUB_OUTPUT"
              echo "live=true" >> "$GITHUB_OUTPUT"
              echo "Downloaded video: $(ls -lh source_video.mp4 | awk '{print $5}')"
            else
              echo "live=false" >> "$GITHUB_OUTPUT"
              echo "ERROR: Failed to resolve or download source"
              exit 1
            fi
          fi

      - name: Overlay text updater
        run: |
          FONT="/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"
          echo "${{ inputs.overlay_text }}" > overlay.txt
          (while true; do
            curl -s "https://strwithgit.pythonanywhere.com/config" | python3 -c "import sys,json; print(json.load(sys.stdin).get('overlay_text',''))" > overlay.txt 2>/dev/null || true
            sleep 10
          done) &

      - name: Start chat renderer
        if: inputs.chat_enabled == 'true' && inputs.fb_live_video_id != '' && inputs.fb_chat_token != ''
        run: |
          echo " " > chat.txt
          pip install -q requests 2>/dev/null || true
          CONFIG_URL="https://strwithgit.pythonanywhere.com/config" python3 $GITHUB_WORKSPACE/chat_renderer.py \
            --platform facebook \
            --video-id "${{ inputs.fb_live_video_id }}" \
            --access-token "${{ inputs.fb_chat_token }}" \
            --output chat.txt \
            --max-messages 5 \
            --poll-interval 3 &
          echo "Chat renderer started"

      - name: Schedule self-reboot
        if: inputs.github_token != ''
        run: |
          (sleep 20400 && for i in 1 2 3; do
            echo "Self-reboot attempt $i..."
            RESP=$(curl -s -X POST \
              -H "Authorization: Bearer ${{ inputs.github_token }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/restream.yml/dispatches" \
              -d "{\"ref\":\"main\",\"inputs\":{
                \"source_url\":\"${{ inputs.source_url }}\",
                \"output_url\":\"${{ inputs.output_url }}\",
                \"overlay_text\":\"${{ inputs.overlay_text }}\",
                \"cookies_b64\":\"${{ inputs.cookies_b64 }}\",
                \"github_token\":\"${{ inputs.github_token }}\",
                \"source_list_b64\":\"${{ inputs.source_list_b64 }}\",
                \"source_index\":\"${{ inputs.source_index }}\",
                \"source_duration\":\"${{ inputs.source_duration }}\",
                \"chat_enabled\":\"${{ inputs.chat_enabled }}\",
                \"fb_live_video_id\":\"${{ inputs.fb_live_video_id }}\",
                \"fb_chat_token\":\"${{ inputs.fb_chat_token }}\"
              }}")
            echo "$RESP"
            if echo "$RESP" | grep -q '"id"'; then
              echo "Self-reboot triggered"
              break
            fi
            sleep 30
          done) &

      - name: Stream to Facebook
        run: |
          MODE="${{ steps.resolve.outputs.mode }}"
          OT="${{ inputs.overlay_text }}"
          FONT="/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"
          CHAT="${{ inputs.chat_enabled }}"
          echo "$OT" > overlay.txt

          FB_URL="${{ inputs.output_url }}"
          DUR="${{ inputs.source_duration }}"
          echo "Output URL: $FB_URL (duration: ${DUR}s, chat: $CHAT)"
          DUR_FLAG=""
          if [ -n "$DUR" ] && [ "$DUR" -gt 0 ] 2>/dev/null; then
            DUR_FLAG="-t $DUR"
            echo "Will limit stream to ${DUR}s"
          fi

          CHAT_FILTER=""
          if [ "$CHAT" = "true" ]; then
            echo " " > chat.txt
            CHAT_FILTER=",drawtext=textfile=chat.txt:reload=1:fontfile=$FONT:fontsize=h*0.018:fontcolor=white:x=10:y=h-th-80:shadowcolor=black@0.7:shadowx=1:shadowy=1"
            echo "Chat overlay enabled"
          fi

          if [ "$MODE" = "download" ]; then
            echo "=== Streaming downloaded file (loop) ==="
            for attempt in $(seq 1 50); do
              echo "=== Stream attempt $attempt at $(date) ==="
              ffmpeg -nostdin -re -stream_loop -1 -i source_video.mp4 \
                -filter_complex "[0:v]scale='min(1920,iw)':'min(1080,ih)':force_original_aspect_ratio=decrease,drawtext=textfile=overlay.txt:reload=1:fontfile=$FONT:fontsize=h*0.04:fontcolor=white:x=(w-text_w)/2:y=h-th-20:shadowcolor=black@0.8:shadowx=3:shadowy=3${CHAT_FILTER},format=yuv420p[out]" \
                -map "[out]" -map 0:a \
                $DUR_FLAG \
                -c:v libx264 -preset fast -r 30 -b:v 6000k -maxrate 6000k -bufsize 12000k -g 60 \
                -x264-params "keyint=60:min-keyint=60" -c:a aac -b:a 128k \
                -f flv "$FB_URL" && break
              echo "ffmpeg exited with code $?, retrying in 15s..."
              sleep 15
            done
          else
            echo "=== Streaming live HLS ==="
            PWL="file,http,https,tcp,tls,crypto,srt,rtmp,rtmps"
            VIDEO_URL="${{ steps.resolve.outputs.video_url }}"
            AUDIO_URL="${{ steps.resolve.outputs.audio_url }}"
            HAS_SEP="${{ steps.resolve.outputs.has_separate_audio }}"

            for attempt in $(seq 1 50); do
              echo "=== Stream attempt $attempt at $(date) ==="
              INPUTS=(-nostdin -re -protocol_whitelist "$PWL" -fflags +discardcorrupt -timeout 30000000 -i "$VIDEO_URL")
              if [ "$HAS_SEP" = "true" ] && [ -n "$AUDIO_URL" ]; then
                INPUTS+=(-i "$AUDIO_URL")
                AMAP="-map 1:a"
              else
                AMAP="-map 0:a"
              fi
              ffmpeg "${INPUTS[@]}" \
                -filter_complex "[0:v]scale='min(1920,iw)':'min(1080,ih)':force_original_aspect_ratio=decrease,drawtext=textfile=overlay.txt:reload=1:fontfile=$FONT:fontsize=h*0.04:fontcolor=white:x=(w-text_w)/2:y=h-th-20:shadowcolor=black@0.8:shadowx=3:shadowy=3${CHAT_FILTER},format=yuv420p[out]" \
                -map "[out]" $AMAP \
                $DUR_FLAG \
                -c:v libx264 -preset fast -r 30 -b:v 6000k -maxrate 6000k -bufsize 12000k -g 60 \
                -x264-params "keyint=60:min-keyint=60" -c:a aac -b:a 128k \
                -f flv "$FB_URL" && break
              echo "ffmpeg exited with code $?, retrying in 15s..."
              sleep 15
            done
          fi

      - name: Advance to next source
        if: always() && inputs.github_token != '' && inputs.source_list_b64 != ''
        run: |
          echo "${{ inputs.source_list_b64 }}" | base64 -d > sources.txt
          TOTAL=$(grep -c '.' sources.txt)
          CURRENT=${{ inputs.source_index }}
          NEXT=$((CURRENT + 1))
          echo "Source $CURRENT of $((TOTAL - 1)) finished"
          if [ "$NEXT" -ge "$TOTAL" ]; then
            echo "Queue finished (all $TOTAL sources played)"
            exit 0
          fi
          NEXT_URL=$(sed -n "$((NEXT+1))p" sources.txt)
          echo "Advancing to source $((NEXT+1)): $NEXT_URL"
          NEXT_B64=$(cat sources.txt | base64 -w0)
          curl -s -X POST \
            -H "Authorization: Bearer ${{ inputs.github_token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/restream.yml/dispatches" \
            -d "{\"ref\":\"main\",\"inputs\":{
              \"source_url\":\"$NEXT_URL\",
              \"output_url\":\"${{ inputs.output_url }}\",
              \"overlay_text\":\"${{ inputs.overlay_text }}\",
              \"cookies_b64\":\"${{ inputs.cookies_b64 }}\",
              \"github_token\":\"${{ inputs.github_token }}\",
              \"source_list_b64\":\"$NEXT_B64\",
              \"source_index\":\"$NEXT\",
              \"source_duration\":\"${{ inputs.source_duration }}\"
            }}"
          echo "Next source triggered"
